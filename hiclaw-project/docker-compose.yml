version: '3.8'

services:
  synapse:
    image: matrixdotorg/synapse:latest
    container_name: matrix-synapse
    ports:
      - "8008:8008"
    volumes:
      - ./matrix-data:/data
    environment:
      - SYNAPSE_SERVER_NAME=localhost
      - SYNAPSE_REPORT_STATS=no
    networks:
      - hiclaw-net
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8008/_matrix/client/versions"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 15s

  hiclaw-manager:
    image: higress-registry.cn-hangzhou.cr.aliyuncs.com/higress/hiclaw-manager:latest
    container_name: hiclaw-manager
    ports:
      - "8080:8080"
    environment:
      - MATRIX_HOMESERVER=http://synapse:8008
    networks:
      - hiclaw-net
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped

  github-collector:
    build:
      context: ./workers
      dockerfile: github-collector/Dockerfile
    container_name: worker-github-collector
    environment:
      - HICLAW_WORKER_NAME=github-collector
      - MATRIX_HOMESERVER=http://synapse:8008
      - MANAGER_ROOM=!CeUycuSgzOBLlMrqsw:localhost
      - MATRIX_ACCESS_TOKEN=syt_Z2l0aHVi_unzcGFWYjhUqyBtqDVXk_426au6
      - GITHUB_TOKEN=${GITHUB_TOKEN}
    networks:
      - hiclaw-net
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped

  arxiv-collector:
    build:
      context: ./workers
      dockerfile: arxiv-collector/Dockerfile
    container_name: worker-arxiv-collector
    environment:
      - HICLAW_WORKER_NAME=arxiv-collector
      - MATRIX_HOMESERVER=http://synapse:8008
      - MANAGER_ROOM=!iAoqrRALVwEVrZBACB:localhost
      - MATRIX_ACCESS_TOKEN=syt_YXJ4aXYtY29sbGVjdG9y_TtqVErhqJtYpnOHTLnkH_2uBrx7
    networks:
      - hiclaw-net
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped

  daily-report:
    build:
      context: ./workers
      dockerfile: daily-report/Dockerfile
    container_name: worker-daily-report
    environment:
      - HICLAW_WORKER_NAME=daily-report
      - MATRIX_HOMESERVER=http://synapse:8008
      - MANAGER_ROOM=!iAoqrRALVwEVrZBACB:localhost
      - MATRIX_ACCESS_TOKEN=syt_ZGFpbHktcmVwb3J0_xByzppvcLGdkneHKNwqj_0cj3sx
    networks:
      - hiclaw-net
    depends_on:
      synapse:
        condition: service_healthy
    restart: unless-stopped

  element-web:
    image: vectorim/element-web:latest
    container_name: element-web
    ports:
      - "80:80"
    environment:
      - DEFAULT_SERVER_URL=http://localhost:8008
    networks:
      - hiclaw-net
    restart: unless-stopped

networks:
  hiclaw-net:
    driver: bridge